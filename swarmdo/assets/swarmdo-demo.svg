<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" role="img" aria-label="swarmdo demo: one prompt spawns a coordinated agent swarm">
  <rect width="960" height="430" rx="12" fill="#0c1014" stroke="#232e39" stroke-width="2"/>
  <!-- title bar -->
  <rect width="960" height="42" rx="12" fill="#131920"/>
  <rect y="30" width="960" height="12" fill="#131920"/>
  <line x1="0" y1="42" x2="960" y2="42" stroke="#232e39" stroke-width="1.5"/>
  <circle cx="26" cy="21" r="6" fill="#5e4444"/><circle cx="46" cy="21" r="6" fill="#5e5744"/><circle cx="66" cy="21" r="6" fill="#465e44"/>
  <text x="88" y="26" font-size="13" fill="#66737f">claude — swarmdo</text>

  <!-- terminal lines, revealed in sequence, looping every 14s -->
  <g font-size="16.5">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.02;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="82"><tspan fill="#e2a33c">$</tspan><tspan fill="#edf1f4" dx="10">swarmdo swarm init</tspan><tspan fill="#66737f" dx="10">--topology hierarchical --max-agents 8</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.05;0.07;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="114"><tspan fill="#83b98a">✓ swarm ready</tspan><tspan fill="#66737f" dx="10">· raft consensus · shared memory namespace</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.12;0.14;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="158"><tspan fill="#e2a33c">$</tspan><tspan fill="#edf1f4" dx="10">claude</tspan><tspan fill="#66737f" dx="10">"use a swarm to ship the auth feature"</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.24;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="196"><tspan fill="#6fb3c4">◉ researcher</tspan><tspan fill="#a9b4be" dx="12">scanning codebase…</tspan><tspan fill="#66737f" dx="10">42 files, 3 auth patterns found</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.34;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="228"><tspan fill="#a38fc9">◉ architect</tspan><tspan fill="#a9b4be" dx="24">design ready</tspan><tspan fill="#66737f" dx="10">→ sent to coder</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.43;0.45;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="260"><tspan fill="#d5b25e">◉ coder</tspan><tspan fill="#a9b4be" dx="56">implementing oauth flow…</tspan><tspan fill="#66737f" dx="10">6 files changed</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.57;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="292"><tspan fill="#83b98a">◉ tester</tspan><tspan fill="#83b98a" dx="48">28 tests passing</tspan><tspan fill="#66737f" dx="10">→ sent to reviewer</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.66;0.68;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="324"><tspan fill="#7d9fc9">◉ reviewer</tspan><tspan fill="#a9b4be" dx="32">approved</tspan><tspan fill="#66737f" dx="10">· 0 security findings</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.76;0.78;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <text x="30" y="366"><tspan fill="#83b98a">✓ swarm complete</tspan><tspan fill="#66737f" dx="10">— 5 agents · patterns stored to memory</tspan></text>
    </g>
    <!-- statusline footer -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.84;0.86;0.97;1" dur="14s" begin="0s" repeatCount="indefinite"/>
      <line x1="30" y1="384" x2="930" y2="384" stroke="#232e39" stroke-width="1.2" stroke-dasharray="3 4"/>
      <text x="30" y="410" font-size="14.5"><tspan fill="#a38fc9" font-weight="700">▊ Swarmdo</tspan><tspan fill="#6fb3c4" dx="10">● my-project</tspan><tspan fill="#66737f" dx="10">│</tspan><tspan fill="#7d9fc9" dx="10">⏇ main</tspan><tspan fill="#66737f" dx="10">│</tspan><tspan fill="#83b98a" dx="10">◉ 5 agents</tspan><tspan fill="#66737f" dx="10">│</tspan><tspan fill="#83b98a" dx="10">● 23% ctx</tspan></text>
    </g>
    <!-- cursor -->
    <rect x="30" y="88" width="10" height="4" fill="#e2a33c">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="88;88;120;120;164;164;372;372" keyTimes="0;0.05;0.07;0.12;0.14;0.76;0.78;1" dur="14s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
