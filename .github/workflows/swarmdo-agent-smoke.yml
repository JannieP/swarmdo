# Structural smoke for the swarmdo-agent plugin (local WASM runtime — rvagent —
# plus the Anthropic Managed Agents cloud runtime, ADR-115). No network: it's
# a static check of the plugin manifest, skills, commands, MCP-tool references,
# and ADR cross-references. Triggers on changes to the plugin or this workflow.
name: swarmdo-agent-smoke

permissions:
  contents: read

on:
  push:
    branches: [main, develop, v3]
    paths:
      - 'plugins/swarmdo-agent/**'
      - '.github/workflows/swarmdo-agent-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/swarmdo-agent/**'
      - '.github/workflows/swarmdo-agent-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    name: swarmdo-agent structural smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Run plugin smoke
        run: bash plugins/swarmdo-agent/scripts/smoke.sh
